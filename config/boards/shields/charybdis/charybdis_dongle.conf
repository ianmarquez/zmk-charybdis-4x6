# Split central with two keyboard-half peripherals
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Allow five host profiles in addition to both split peripherals
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Receive and process trackball input from the right peripheral
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

# Snake Dongle display requirements
CONFIG_PINCTRL=y
CONFIG_SPI=y
CONFIG_ST7789V=y
CONFIG_ST7789V_RGB565=y
CONFIG_HEAP_MEM_POOL_SIZE=65536

# Snake display configuration (backlight control intentionally omitted)
CONFIG_SNAKE_FATNESS=1
CONFIG_SNAKE_BOARD_SIZE="XL"
CONFIG_SNAKE_WALK_INTERVAL=20
CONFIG_CHECKERED_BOARD=y
CONFIG_DEFAULT_SCREEN="snake"
CONFIG_LOGO_WALK_INTERVAL=40
CONFIG_BATTERY_SLOTS=2
CONFIG_INFO_SLOT_MODE="2-slot"
CONFIG_INFO_SLOT_1="connectivity"
CONFIG_INFO_SLOT_2="layer"

# Sound is disabled by default
CONFIG_USE_BUZZER=n
